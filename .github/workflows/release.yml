name: Release nixarch ISO

# Full from-scratch pipeline: store libs -> arch base generation ->
# bootable ISO -> QEMU smoke boot. Every push to main republishes the
# rolling "latest" prerelease; v* tags publish a versioned release.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    # docs-only pushes don't need a 10-min ISO rebuild; tag pushes
    # skip path filters so v* releases are unaffected
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  iso:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
      # generation.sh needs userns + overlay mounts inside the container
      options: --privileged
    steps:
      - name: Prepare arch
        run: |
          pacman-key --init
          pacman --noconfirm -Sy archlinux-keyring
          # build deps per src/*/meson.build, plus: curl+zstd for the
          # bootstrap tarball, grub/xorriso/mtools for mkiso, gh for
          # releases. libsodium/libarchive/brotli/libseccomp belonged
          # to cut upstream subsystems (signing, fetchers, compression,
          # build sandbox)
          pacman --noconfirm --needed -Syu git meson ninja gcc pkgconf boost boost-libs \
            openssl zstd libblake3 nlohmann-json sqlite curl \
            grub xorriso mtools github-cli
          # container root has no subuid range; without one bootstrap.sh
          # falls back to its single-uid sandbox and pacman hooks spam
          # fchownat EINVAL (chowns fail soft). Match the local multi-uid path
          echo "root:100000:65536" > /etc/subuid
          echo "root:100000:65536" > /etc/subgid
          # workspace is runner-owned, container runs as root: git (and gh,
          # which shells out to it) refuses the repo without this
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build store libs
        run: ./build.sh
      - name: Bootstrap base generation
        # stdout's last line is exactly the base store path
        run: |
          arch/bootstrap.sh build/archstore | tee build/bootstrap.out
          tail -n1 build/bootstrap.out > build/base-path
      - name: Build ISO
        run: arch/iso/mkiso.sh build/archstore "$(cat build/base-path)"
      - name: Checksum
        run: sha256sum build/nixarch.iso > build/nixarch.iso.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nixarch-iso
          path: |
            build/nixarch.iso
            build/nixarch.iso.sha256
      - name: Release (versioned, on v* tags)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/nixarch.iso build/nixarch.iso.sha256 \
            --title "nixarch ISO $GITHUB_REF_NAME" --generate-notes
      - name: Release (rolling, on push)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        # a release needs a tag to exist under; "latest" is recreated at
        # the current commit each push (--cleanup-tag drops the old tag)
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest build/nixarch.iso build/nixarch.iso.sha256 \
            --prerelease --target "$GITHUB_SHA" \
            --title "nixarch ISO (rolling)" \
            --notes "Built from $GITHUB_SHA"
