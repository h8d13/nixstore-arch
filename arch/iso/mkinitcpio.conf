# nixarch ISO initramfs (mkinitcpio.conf.d drop-in, overrides the stock
# conf). No autodetect: image carries all block/fs drivers so the same
# ISO boots VMs and real hardware. systemd init, not busybox: the root
# overlay is a generated mount unit, and sd-encrypt (when a store lands
# on LUKS) only composes with this hook set. base stays for a rescue
# shell and blkid; encryption inserts sd-encrypt before nixgen, which
# must see an already-unlocked store device.
MODULES=(loop overlay squashfs iso9660 sr_mod cdrom)
BINARIES=()
FILES=()
HOOKS=(base systemd keyboard block nixgen)
COMPRESSION="zstd"
